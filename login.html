<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Moda Elite</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
    width:90px;
    height:90px;
    background:#111;
    color:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
    margin:auto;
    margin-bottom:20px;
}

.login-box h1{
    text-align:center;
    color:#111;
    margin-bottom:10px;
}

.login-box p{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

input:focus{
    border-color:#111;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#222;
}

.error{
    text-align:center;
    color:red;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="login-box">

    <div class="logo">
        ME
    </div>

    <h1>Moda Elite</h1>

    <p>Fashion Management System</p>

    <input
        type="text"
        id="usuario"
        placeholder="Usuario">

    <input
        type="password"
        id="password"
        placeholder="Contraseña">

    <button onclick="login()">
        Iniciar Sesión
    </button>

    <p id="mensaje" class="error"></p>

</div>

<script>

function login(){

    let usuario =
        document.getElementById("usuario").value;

    let password =
        document.getElementById("password").value;

    if(usuario === "admin" &&
       password === "1234"){

        window.location.href =
            "index.html";

    }else{

        document.getElementById("mensaje")
            .innerText =
            "Usuario o contraseña incorrectos";
    }
}

</script>

</body>
</html>
